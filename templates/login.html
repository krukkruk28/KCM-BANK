<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KCM Bank - Login</title>
    <link rel="stylesheet" href="../static/login.css">
</head> 
<body>
    <div class="login-container">
        <div class="header">
            <h1>KCM BANK</h1>
        </div>

        {% if error %}
        <div class="error-message" role="alert" aria-live="assertive">
            <p>{{ error }}</p>
        </div>
        {% endif %}

         <div class="welcome-message">
            <h2>Welcome to KCM Bank</h2>
             <p>Please enter your username and password to access your account.</p>
             <p>If you don't have an account, please contact our support team to create one.</p>
             <p>Thank you for choosing KCM Bank!</p>
         </div>

        <form action="/login" method="post">
            <div class="form-group">
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" value="{{ username }}">
            </div>

            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>
            </div>

            <div class="form-group checkbox-group">
                <input type="checkbox" id="showPassword" onchange="togglePasswordVisibility()">
                <label for="showPassword">Show Password</label>
            </div>
            <input type="submit" value="Login">
        </form>
    <div class="signup-container">
        <a href="/signup" class="signup-button">Sign Up</a>
    </form>
    </div>
    <script>
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const checkbox = document.getElementById('showPassword');
            if (checkbox.checked) {
                passwordInput.type = 'text';
            } else {
                passwordInput.type = 'password';
            }
        }
    </script>
</body>
</html>
